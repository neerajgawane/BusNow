version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: busnow
      POSTGRES_PASSWORD: busnowpassword
      POSTGRES_DB: busnow_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: busnow
      DB_PASSWORD: busnowpassword
      DB_NAME: busnow_db
      JWT_SECRET: supersecretjwtkey
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata: